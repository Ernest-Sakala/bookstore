<header class="admin-navbar">
  <div class="admin-navbar-inner">

    <!-- Right: user info + actions -->
    <div class="navbar-right">

      <!-- Back to store -->
      <a routerLink="/" class="btn-store">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
          <path d="M9 3L5 7.5 9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back to Store
      </a>

      @if (auth.currentUser(); as user) {
        <!-- User chip -->
        <div class="user-chip">
          <div class="avatar">{{ user.name.charAt(0).toUpperCase() }}</div>
          <div class="user-info">
            <span class="user-name">{{ user.name }}</span>
            <span class="user-role">{{ user.role }}</span>
          </div>
        </div>

        <!-- Logout -->
        <button class="btn-logout" (click)="auth.logout()">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M6 2H3a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M10 10l3-3-3-3M13 7H6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Logout
        </button>
      }

    </div>
  </div>
</header>
