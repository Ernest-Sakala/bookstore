<nav class="navbar">
  <h1>Bookstore</h1>
  <button [routerLink]="['']" class="nav-btn">Books</button>
  <button [routerLink]="['/books-list']" class="nav-btn">Books List</button>
</nav>

<div class="upload-form" data-testid="upload-form">
  <h2>Upload Book</h2>
  <form [formGroup]="bookForm" (ngSubmit)="submitForm()">

    <label>
      <span>Title</span>
      <input type="text" formControlName="title" placeholder="Enter book title" />
    </label>

    <label>
      <span>Author</span>
      <input type="text" formControlName="author"
             list="bu-authors-list"
             placeholder="Enter or select author"
             autocomplete="off" />
      <datalist id="bu-authors-list">
        @for (a of authors(); track a) {
          <option [value]="a"></option>
        }
      </datalist>
    </label>

    <label>
      <span>Category</span>
      <input type="text" formControlName="category"
             list="bu-categories-list"
             placeholder="Enter or select category"
             autocomplete="off" />
      <datalist id="bu-categories-list">
        @for (cat of categories(); track cat) {
          <option [value]="cat"></option>
        }
      </datalist>
    </label>

    <label>
      <span>Description</span>
      <textarea formControlName="description" rows="3" placeholder="Brief description of the book…"></textarea>
    </label>

    <label>
      <span>Book Cover Image</span>
      <input type="file" (change)="onFileChange($event, 'image')" accept="image/*" />
    </label>

    <button type="submit">Upload Book</button>
  </form>
</div>

<div *ngIf="successMessage" class="toast-success" data-testid="upload-success">
  Book uploaded successfully
</div>
