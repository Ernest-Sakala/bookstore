<div class="upload-form">
  <h2>Upload Book</h2>
  <form [formGroup]="bookForm" (ngSubmit)="submitForm()">
    <label>
      Title:
      <input type="text" formControlName="title" />
    </label>

    <label>
      Author:
      <input type="text" formControlName="author" />
    </label>

    <label>
      Category:
      <select formControlName="category">
        <option value="Technical">Technical</option>
        <option value="Self Improvement">Self Improvement</option>
      </select>
    </label>

    <label>
      Book Cover Image:
      <input type="file" (change)="onFileChange($event, 'image')" accept="image/*" />
    </label>

    <label>
      Book PDF/File:
      <input type="file" (change)="onFileChange($event, 'file')" accept=".pdf,.doc,.docx" />
    </label>

    <button type="submit" [disabled]="bookForm.invalid">Upload Book</button>
  </form>
</div>
