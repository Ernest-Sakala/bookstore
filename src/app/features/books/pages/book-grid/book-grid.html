<nav class="navbar">
  <h1>Bookstore</h1>
  <button [routerLink]="['/upload-book']">Upload Book</button>
</nav>

<div class="grid">
  @if (loading()) {
    <p>Loading books...</p>
  } @else {
    @for (book of books(); track book.id) {
      <div class="card">
        <img [src]="'/assets/images/' + book.imageSlug" alt="{{ book.title }}" />
        <h3>{{ book.title }}</h3>
        <p>{{ book.author }}</p>
        <button (click)="downloadBook(book)">Download</button>
      </div>
    } @empty {
      <p>No books available.</p>
    }
  }
</div>
