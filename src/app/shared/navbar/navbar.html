<header class="navbar">
  <div class="navbar-inner">

    <!-- Brand -->
    <a class="navbar-brand" routerLink="/">
      <div class="brand-icon">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M4 18V5a1 1 0 0 1 1-1h8l4 4v10a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1z" fill="white" fill-opacity="0.9"/>
          <path d="M13 4v4h4" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M7 10h8M7 13h6M7 16h4" stroke="#6366f1" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="brand-name">PageTurn</span>
    </a>

    <!-- Search -->
    <div class="search-bar">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <input
        type="text"
        placeholder="Search by title or author…"
        (input)="onSearch($event)"
        (keyup.enter)="onSearch($event)"
      />
    </div>

    <!-- Actions -->
    <nav class="navbar-actions">
      @if (auth.isAdmin()) {
        <a routerLink="/upload-book" class="btn-upload">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M7.5 1v9M4 4l3.5-3.5L11 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M1 11v2a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Upload Book
        </a>
      }

      @if (auth.currentUser(); as user) {
        <div class="user-chip">
          <div class="avatar">{{ user.name.charAt(0).toUpperCase() }}</div>
          <span class="username">{{ user.name }}</span>
        </div>
        <button class="btn-logout" (click)="auth.logout()">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M6 2H3a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M10 10l3-3-3-3M13 7H6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Logout
        </button>
      } @else {
        <a routerLink="/login" class="btn-login">Sign In</a>
        <a routerLink="/register" class="btn-register">Get Started</a>
      }
    </nav>

    <!-- Mobile hamburger -->
    <button class="hamburger" (click)="menuOpen = !menuOpen" aria-label="Toggle menu">
      @if (menuOpen) {
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M4 4l12 12M16 4L4 16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      } @else {
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      }
    </button>

  </div>

  <!-- Mobile menu -->
  @if (menuOpen) {
    <div class="mobile-menu">
      <div class="mobile-search">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.4"/>
          <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <input type="text" placeholder="Search books…" (input)="onSearch($event)" />
      </div>
      @if (auth.isAdmin()) {
        <a routerLink="/upload-book" class="mobile-link" (click)="menuOpen = false">Upload Book</a>
      }
      @if (auth.currentUser()) {
        <button class="mobile-link logout" (click)="auth.logout(); menuOpen = false">Logout</button>
      } @else {
        <a routerLink="/login" class="mobile-link" (click)="menuOpen = false">Sign In</a>
        <a routerLink="/register" class="mobile-link" (click)="menuOpen = false">Get Started</a>
      }
    </div>
  }
</header>
