<aside class="sidebar" [class.collapsed]="collapsed()">

  <!-- Brand / collapse toggle -->
  <div class="sidebar-header">
    @if (!collapsed()) {
      <div class="brand">
        <div class="brand-icon">
          <svg width="20" height="20" viewBox="0 0 22 22" fill="none">
            <path d="M4 18V5a1 1 0 0 1 1-1h8l4 4v10a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1z" fill="white" fill-opacity="0.9"/>
            <path d="M13 4v4h4" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M7 10h8M7 13h6M7 16h4" stroke="#6366f1" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="brand-name">PageTurn</span>
      </div>
    }
    <button class="collapse-btn" (click)="collapseToggle.emit()" [title]="collapsed() ? 'Expand' : 'Collapse'">
      @if (collapsed()) {
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M7 4l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      } @else {
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M11 4L6 9l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      }
    </button>
  </div>

  <!-- Label -->
  @if (!collapsed()) {
    <p class="nav-label">Menu</p>
  }

  <!-- Nav items -->
  <nav class="sidebar-nav">

    <!-- Overview -->
    <button class="nav-item" [class.active]="active() === 'overview'" (click)="select('overview')" title="Overview">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="1.5" y="1.5" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
          <rect x="10.5" y="1.5" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
          <rect x="1.5" y="10.5" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
          <rect x="10.5" y="10.5" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
        </svg>
      </span>
      @if (!collapsed()) { <span class="nav-label-text">Overview</span> }
    </button>

    <!-- Upload Book -->
    <button class="nav-item" [class.active]="active() === 'upload'" (click)="select('upload')" title="Upload Book">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M9 1v10M5.5 4.5L9 1l3.5 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3 13v2a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </span>
      @if (!collapsed()) { <span class="nav-label-text">Upload Book</span> }
    </button>

    <!-- Manage Books -->
    <button class="nav-item" [class.active]="active() === 'books'" (click)="select('books')" title="Manage Books">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M3 15V4a1 1 0 0 1 1-1h6l4 4v8a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z" stroke="currentColor" stroke-width="1.4"/>
          <path d="M9 3v4h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M6 10h6M6 13h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </span>
      @if (!collapsed()) { <span class="nav-label-text">Manage Books</span> }
    </button>

  </nav>

  <!-- Footer -->
  @if (!collapsed()) {
    <div class="sidebar-footer">
      <span class="footer-tag">Admin Panel</span>
    </div>
  }

</aside>
